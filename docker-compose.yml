version: "3.9"

services:

  flask:
    build: .
    container_name: meal-planner-flask
    command: python backend/server.py
    ports:
      - "5000:5000"
    environment:
      - GROQ_API_KEY=${GROQ_API_KEY}
      - FLASK_SECRET_KEY=${FLASK_SECRET_KEY}
      - PYTHONPATH=/app
    volumes:
      - memory_data:/app/memory/profiles
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    restart: unless-stopped

  streamlit:
    build: .
    container_name: meal-planner-streamlit
    command: streamlit run app.py --server.port=8501 --server.address=0.0.0.0 --server.headless=true
    ports:
      - "8501:8501"
    environment:
      - FLASK_URL=http://flask:5000
      - PYTHONPATH=/app
    depends_on:
      flask:
        condition: service_healthy
    restart: unless-stopped

volumes:
  memory_data:
    driver: local